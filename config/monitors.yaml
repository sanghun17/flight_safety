update_rate_hz: 2.0     # diagnostics REPORT 주기 (monitor_node, 사람/rqt용)
react_rate_hz: 50.0     # 반응 루프 주기 (safety_node)
require_armed: true     # 무장 상태에서만 개입

# ── 감지: subsystem -> layer -> monitor ───────────────────────────────
subsystems:
  vrpn:
    heartbeat:                               # 토픽 살아있나(node 死)만. rate/freeze 상세는 vrpn 내부 진단(in-node).
      kind: topic
      topic: /vrpn_client_node/pure/pose
      checks: [dropout]                      # AnyMsg liveness — 무발행 = 死
      dropout_timeout_s: 0.3                 # 이 시간 무발행 -> 토픽/노드 死 -> land (tunable)
    consistency:                             # VRPN <-> local_position 불일치 (cross-node, 외부 전용)
      kind: consistency
      topic_a: /vrpn_client_node/pure/pose
      topic_b: /mavros/local_position/pose
      sync_slop_s: 0.05
      pair_timeout_s: 0.5
      error_warn_m: 0.10
      error_error_m: 0.25
  # RC stream check removed — redundant with mavros "rc receiver" (System diag),
  # PX4's authoritative RC health (Ok / manual kill / Fail). The supervisor still
  # reads /mavros/rc/in VALUES for pilot takeover (control_mux below); RC loss
  # itself is handled by PX4's native failsafe (NAV_RCL_ACT).

# ── fault(monitor ERROR) -> response 매핑 (추가/수정은 여기 한 줄) ──────
rules:
  - { monitor: vrpn/heartbeat,   response: land }   # VRPN 토픽/노드 死
  - { monitor: vrpn/consistency, response: land }   # VRPN-local_position 불일치 (움직이는 중 freeze도 여기서 잡힘)

# ── 응답 3종 (severity: hold<land<kill) ───────────────────────────────
responses:
  hold: { type: hold }
  land: { type: land, descend_mps: 0.4 }
  kill: { type: kill }

# ── geofence (VRPN으로 판별; 접근->clamp, 이탈->kill, 모름->무동작) ──────
geofence:
  source: /vrpn_client_node/pure/pose
  box: { x: [-2.0, 2.0], y: [-2.0, 2.0], z: [0.0, 2.5] }   # m — 실제 zone에 맞게
  margin_m: 0.3            # 경계 이내 -> APPROACHING (clamp 발동)
  clamp_gain: 1.5         # 허용 outward 속도 = gain * 경계까지 거리
  pose_timeout_s: 0.2     # source stale -> UNKNOWN -> 무동작

# ── control MUX (우선순위: Manual > Response > Normal) ─────────────────
control_mux:
  setpoint_out: /mavros/setpoint_raw/local
  normal_in: /flight_safety/normal_setpoint   # JAX/control_bridge가 여기로 발행하도록 변경 필요
  rc_topic: /mavros/rc/in
  rc_channels: [0, 1, 3]                       # roll/pitch/yaw (TX 매핑)
  rc_center_us: 1500
  rc_range_us: 500
  rc_deflection: 0.25
  manual_mode: POSCTL
