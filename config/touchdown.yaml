# IMU touchdown -> KILL during emergency LAND (flight_safety_touchdown).
# Feature = EKF world-vertical specific force (m/s^2). land_drill bags 2026-06-24:
# descent <= ~12.7, touchdown 20..50. Validate any change with
# tools/flight_safety/validate_touchdown.py before flight.
vert_thresh: 16.0     # world-up specific force for an impact "hit" (NOT |a|, NOT body-z)
gyro_thresh: 0.3      # AND require |gyro| (rad/s) >= this -- a real impact rocks the frame
min_land_s: 0.3       # ignore this long after LAND begins (entry transient)
confirm: 2            # hits needed within window_s to latch (burst-tolerant, rejects a glitch)
window_s: 0.25
imu_topic: /mavros/imu/data
